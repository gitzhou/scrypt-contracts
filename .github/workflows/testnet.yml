name: Testnet Test

on:
  schedule:
    # At 00:00 on day-of-month 6, 12, 18, 24, and 30.
    # https://crontab.guru
    - cron: "0 0 6,12,18,24,30 * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm i
      - name: Update env
        run: echo "PRIVATE_KEY="${{ secrets.PRIVATE_KEY }}"" > .env
      - name: Test
        run: npm run testnet
